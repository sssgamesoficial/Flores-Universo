<!DOCTYPE html>
<html lang="es">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Universo de flores</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.z = 5;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Luz
  const light = new THREE.PointLight(0xffffff, 1);
  light.position.set(10, 10, 10);
  scene.add(light);

  // Semilla
  const semillaTexture = new THREE.TextureLoader().load("semilla.png");

  const semillaMaterial = new THREE.SpriteMaterial({
  map: semillaTexture,
  transparent: true
  });

  const semilla = new THREE.Sprite(semillaMaterial);
  semilla.scale.set(2, 2, 2);

  scene.add(semilla);

  // Estrellas
  const estrellaTexture = new THREE.TextureLoader().load("estrella.png");

  for (let i = 0; i < 300; i++) {

  const material = new THREE.SpriteMaterial({
    map: estrellaTexture,
    transparent: true
  });

  const estrella = new THREE.Sprite(material);

  estrella.position.set(
    (Math.random() - 0.5) * 50,
    (Math.random() - 0.5) * 50,
    (Math.random() - 0.5) * 50
  );

  const tamaño = Math.random() * 0.5 + 0.1;
  estrella.scale.set(tamaño, tamaño, tamaño);

  scene.add(estrella);
}

  // 🌻 Cargar textura de girasol
  const textureLoader = new THREE.TextureLoader();
  const girasolTexture = textureLoader.load("planta.png");

  const mensajes = [
    "Eres mi sol 💛",
    "Contigo todo florece 🌻",
    "Siempre tú ✨",
    "Eres mi paz",
    "Me haces feliz 💕"
  ];

  // Crear texto en canvas (truco pro 🔥)
  function crearTexto3D(texto) {
    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");

    canvas.width = 256;
    canvas.height = 128;

    context.fillStyle = "white";
    context.font = "24px   Quicksand";
    context.fillText(texto, 10, 50);

    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({ map: texture });

    const sprite = new THREE.Sprite(material);
    sprite.scale.set(2, 1, 1);

    return sprite;
  }

  // Click → crear girasol + mensaje
  window.addEventListener("click", () => {

    const materialFlor = new THREE.SpriteMaterial({
      map: girasolTexture,
      transparent: true
    });

    const flor = new THREE.Sprite(materialFlor);

    flor.position.set(
      (Math.random() - 0.5) * 6,
      (Math.random() - 0.5) * 6,
      (Math.random() - 0.5) * 6
    );

    flor.scale.set(1.5, 1.5, 1.5);
    scene.add(flor);

    // 💬 mensaje
    const mensaje = crearTexto3D(
      mensajes[Math.floor(Math.random() * mensajes.length)]
    );

    mensaje.position.copy(flor.position);
    mensaje.position.y += 1;

    scene.add(mensaje);
  });

  // Movimiento con mouse
  let mouseX = 0;
  let mouseY = 0;

  document.addEventListener("mousemove", (event) => {
    mouseX = (event.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
  });

  function animate() {
    requestAnimationFrame(animate);

    camera.position.x += (mouseX * 5 - camera.position.x) * 0.05;
    camera.position.y += (mouseY * 5 - camera.position.y) * 0.05;

    camera.lookAt(scene.position);

    renderer.render(scene, camera);
  }

  animate();
</script>

</body>
</html>
